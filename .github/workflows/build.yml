# Builds the standalone GUI recovery app for Windows, macOS, and Linux.
# PyInstaller can't cross-compile, so each OS builds on its own runner.
# Artifacts: alkemio-recover-{windows,macos,linux} (download from the run page).
#
# Delivery: macOS/Windows artifacts are UNSIGNED -> Gatekeeper/SmartScreen warn.
# Sign+notarize for a clean experience, or tell users right-click->Open /
# "More info -> Run anyway".
name: build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sep: ":"
            artifact: alkemio-recover-linux
          - os: macos-latest
            sep: ":"
            artifact: alkemio-recover-macos
          - os: windows-latest
            sep: ";"
            artifact: alkemio-recover-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify Tkinter (needed to bundle the GUI; 8.6+ required)
        shell: bash
        run: |
          python - <<'PY'
          import tkinter, sys
          v = float(tkinter.TkVersion)
          print("Tk", v)
          assert v >= 8.6, f"Tk {v} too old (8.5 aborts on recent macOS)"
          PY
      - run: pip install pyinstaller
      - name: Build standalone GUI app
        shell: bash
        run: |
          test -f target_hashes.txt || { echo "::error::target_hashes.txt missing (run gen_hashes.py and commit it)"; exit 1; }
          pyinstaller --onefile --windowed --noconfirm --clean \
            --name alkemio-recover \
            --add-data "target_hashes.txt${{ matrix.sep }}." \
            alkemio_cache_recover.py
      - name: Smoke test (engine selftest inside the built app)
        shell: bash
        run: |
          if [ -d dist/alkemio-recover.app ]; then
            dist/alkemio-recover.app/Contents/MacOS/alkemio-recover --selftest
          else
            ./dist/alkemio-recover* --selftest
          fi
      # Package the final release asset ON THE BUILD OS. Critically, zip the macOS
      # .app here with `ditto` so the executable bit / symlinks / signature are
      # preserved INSIDE the archive — `upload-artifact` strips the +x bit off
      # loose files, which previously produced a non-executable, un-openable app.
      - name: Package release asset
        shell: bash
        run: |
          mkdir -p out
          case "${{ runner.os }}" in
            macOS)   ditto -c -k --keepParent dist/alkemio-recover.app out/alkemio-recover-macos.zip ;;
            Windows) cp dist/alkemio-recover.exe out/alkemio-recover-windows.exe ;;
            Linux)   cp dist/alkemio-recover     out/alkemio-recover-linux ;;
          esac
          ls -la out
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: error

  # Publish the three binaries as assets on a rolling "latest" GitHub Release so
  # they have stable, linkable download URLs for the README
  # (releases/download/latest/<asset>). Runs only on main (not on PRs).
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        shell: bash
        run: |
          # Assets are already packaged per-OS in the build jobs (macOS zipped with
          # ditto to keep the exec bit). Just gather them — do NOT re-zip here.
          mkdir -p release
          find artifacts -type f \( \
            -name 'alkemio-recover-windows.exe' -o \
            -name 'alkemio-recover-macos.zip'   -o \
            -name 'alkemio-recover-linux' \) -exec cp {} release/ \;
          ls -la release
      - name: Publish/refresh rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create latest --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
                 --title "Latest build" \
                 --notes "Automated build of the browser-cache recovery app. Unsigned: on macOS right-click → Open the first time; on Windows choose More info → Run anyway. See the README."
          gh release upload latest --repo "$GITHUB_REPOSITORY" --clobber \
            release/alkemio-recover-windows.exe \
            release/alkemio-recover-macos.zip \
            release/alkemio-recover-linux
