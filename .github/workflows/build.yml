# Builds the standalone GUI recovery app for Windows, macOS, and Linux, for BOTH
# targets: prod (embeds target_hashes.txt) and acceptance (target_hashes_acc.txt).
# PyInstaller can't cross-compile, so each OS builds on its own runner.
#
# Linux is built on ubuntu-22.04 (glibc 2.35) on purpose: a binary built on newer
# glibc won't run on older systems, so we target the oldest we support -> runs on
# Ubuntu 22.04 and newer.
#
# Delivery: macOS/Windows artifacts are UNSIGNED -> Gatekeeper/SmartScreen warn.
name: build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- prod ----
          - { os: ubuntu-22.04,   sep: ":", env: prod, hashfile: target_hashes.txt,     artifact: alkemio-recover-prod-linux }
          - { os: macos-latest,   sep: ":", env: prod, hashfile: target_hashes.txt,     artifact: alkemio-recover-prod-macos }
          - { os: windows-latest, sep: ";", env: prod, hashfile: target_hashes.txt,     artifact: alkemio-recover-prod-windows }
          # ---- acceptance ----
          - { os: ubuntu-22.04,   sep: ":", env: acc,  hashfile: target_hashes_acc.txt, artifact: alkemio-recover-acc-linux }
          - { os: macos-latest,   sep: ":", env: acc,  hashfile: target_hashes_acc.txt, artifact: alkemio-recover-acc-macos }
          - { os: windows-latest, sep: ";", env: acc,  hashfile: target_hashes_acc.txt, artifact: alkemio-recover-acc-windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Verify Tkinter (needed to bundle the GUI; 8.6+ required)
        shell: bash
        run: python -c "import tkinter; v=float(tkinter.TkVersion); print('Tk', v); assert v>=8.6, f'Tk {v} too old'"
      - run: pip install pyinstaller
      - name: Build standalone GUI app (${{ matrix.env }})
        shell: bash
        run: |
          test -f "${{ matrix.hashfile }}" || { echo "::error::${{ matrix.hashfile }} missing"; exit 1; }
          # the app reads target_hashes.txt from the bundle; swap in this variant's list
          [ "${{ matrix.hashfile }}" = "target_hashes.txt" ] || cp "${{ matrix.hashfile }}" target_hashes.txt
          pyinstaller --onefile --windowed --noconfirm --clean \
            --name alkemio-recover \
            --add-data "target_hashes.txt${{ matrix.sep }}." \
            alkemio_cache_recover.py
      - name: Smoke test (engine selftest inside the built app)
        shell: bash
        run: |
          if [ -d dist/alkemio-recover.app ]; then
            dist/alkemio-recover.app/Contents/MacOS/alkemio-recover --selftest
          else
            ./dist/alkemio-recover* --selftest
          fi
      # Package the final asset ON THE BUILD OS (macOS .app zipped with ditto to keep
      # the executable bit). Filename carries the env so prod/acc don't collide.
      - name: Package release asset
        shell: bash
        run: |
          mkdir -p out
          case "${{ runner.os }}" in
            macOS)   ditto -c -k --keepParent dist/alkemio-recover.app "out/alkemio-recover-${{ matrix.env }}-macos.zip" ;;
            Windows) cp dist/alkemio-recover.exe "out/alkemio-recover-${{ matrix.env }}-windows.exe" ;;
            Linux)   cp dist/alkemio-recover     "out/alkemio-recover-${{ matrix.env }}-linux" ;;
          esac
          ls -la out
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: error

  # Publish all 6 binaries (prod+acc × win/mac/linux) as assets on a rolling
  # "latest" release, stable download URLs for the README. Runs only on main.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name 'alkemio-recover-*-windows.exe' -o \
            -name 'alkemio-recover-*-macos.zip'   -o \
            -name 'alkemio-recover-*-linux' \) -exec cp {} release/ \;
          ls -la release
      - name: Publish/refresh rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create latest --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
                 --title "Latest build" \
                 --notes "Automated build. Assets: alkemio-recover-{prod,acc}-{windows,macos,linux}. Unsigned: on macOS right-click -> Open; on Windows More info -> Run anyway. Linux binary needs glibc 2.35+ (Ubuntu 22.04+)."
          gh release upload latest --repo "$GITHUB_REPOSITORY" --clobber release/*
